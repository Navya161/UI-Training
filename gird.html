<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="grid.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>Container</h1>
    <div class="container p-3 mb-2 border rounded">
      <div class="row p-2 mb-1 border rounded">
        <div class="col-1 border rounded">1</div>
        <div class="col-1 border rounded">2</div>
        <div class="col-1 border rounded">3</div>
        <div class="col-1 border rounded">4</div>
        <div class="col-1 border rounded">5</div>
        <div class="col-1 border rounded">6</div>
        <div class="col-1 border rounded">7</div>
        <div class="col-1 border rounded">8</div>
        <div class="col-1 border rounded">9</div>
        <div class="col-1 border rounded">10</div>
        <div class="col-1 border rounded">11</div>
        <div class="col-1 border rounded">12</div>
      </div>

      <div class="row p-2 mb-2 border rounded">
        <div class="col-6 border rounded">This Col occupies 6 spaces</div>
        <div class="col-6 border rounded">This Col occupies 6 spaces</div>
      </div>

      <div class="row p-2 mb-2 border rounded">
        <div class="col-4 border rounded">This Col occupies 4 spaces</div>
        <div class="col-6 border rounded">This Col occupies 6 spaces</div>
        <div class="col-2 border rounded">This col 2</div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
